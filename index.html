<!DOCTYPE html>
<html>
<head>
  <title>For My Love ❤️</title>
  <style>
    body {
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      text-align: center;
      font-family: Arial, sans-serif;
      color: white;
      padding-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background-color: white;
      color: hotpink;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: hotpink;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Hi My Princess 👑</h1>
  <p>You are the best thing that ever happened to me 💖</p>
  <p>I am so lucky to have you in my life ✨</p>

  <button onclick="showMessage()">Click Here ❤️</button>

  <script>
    function showMessage() {
      alert("I Love You So Much 💍 Forever and Always!");
    }
  </script>

</body>
</html>
